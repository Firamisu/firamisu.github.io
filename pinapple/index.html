<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" /> 
    <meta name="author" content="Filip Góra kl. IIF nr. 8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Pinapple Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" media="screen" href="style.css" />

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Ranchers&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="logo"><img src="fruit.svg"> Pinapple</div>
        <div class="navel"><a href="#">Homepage</a></div>
        <div class="navel"><a href="#">About Us</a></div>
        <div class="navel"><a href="#">Contact</a></div>
    </nav>
    <main>
        <article class="form-box">
                <form>
                <img class="close" src="close.svg">
                <input placeholder="Imię" type="text">
                <input placeholder="Nazwisko" type="text">
                <input placeholder="Miejscowość" type="text">
                <input placeholder="Ulica i Nr. Domu" type="text">
                <input placeholder="Ilość" type="number">
                <select>
                    <option disabled selected>Wybierz gatunek ananasa.</option>
                    <option>Gat1.</option>
                    <option>Gat2.</option>
                    <option>Gat3.</option>
                </select>
                <input type="submit" value="Zamawiam ananasy!">
            </form>
        </article>
        <header>
            <p>Najlepsze Ananasy w Europie!</p>
            <button class="order">Zamów teraz!</button>
            <div class="dark"></div>
        </header>
       
    </main>
    <script src="main.js"></script>
</body>
</html>
